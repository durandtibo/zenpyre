name: Cyclic Imports
on:
  workflow_call:
  workflow_dispatch:  # to trigger manually

permissions:
  contents: read

jobs:
  cyclic-import:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v7

      - name: Setup python environment
        uses: durandtibo/setup-venv-uv-action@v0.0.3

      - name: check zenpyre
        run: |
          python -c "import zenpyre"

      - name: check zenpyre.agents
        run: |
          python -c "from zenpyre import agents"
          python -c "from zenpyre.agents import factory"

      - name: check zenpyre.chat_models
        run: |
          python -c "from zenpyre import chat_models"
          python -c "from zenpyre.chat_models import factory"

      - name: check zenpyre.data_processors
        run: |
          python -c "from zenpyre import data_processors"
          python -c "from zenpyre.data_processors import factory"

      - name: check zenpyre.document_loaders
        run: |
          python -c "from zenpyre import document_loaders"
          python -c "from zenpyre.document_loaders import factory"

      - name: check zenpyre.document_stores
        run: |
          python -c "from zenpyre import document_stores"
          python -c "from zenpyre.document_stores import factory"

      - name: check zenpyre.documents
        run: |
          python -c "from zenpyre import documents"
          python -c "from zenpyre.documents import analysis"

      - name: check zenpyre.embeddings
        run: |
          python -c "from zenpyre import embeddings"
          python -c "from zenpyre.embeddings import factory"

      - name: check zenpyre.ingestors
        run: |
          python -c "from zenpyre import ingestors"
          python -c "from zenpyre.ingestors import factory"

      - name: check zenpyre.record_stores
        run: |
          python -c "from zenpyre import record_stores"
          python -c "from zenpyre.record_stores import factory"

      - name: check zenpyre.records
        run: |
          python -c "from zenpyre import records"
          python -c "from zenpyre.records import analysis"

      - name: check zenpyre.runnables
        run: |
          python -c "from zenpyre import runnables"
          python -c "from zenpyre.runnables import factory"

      - name: check zenpyre.testing
        run: |
          python -c "from zenpyre import testing"

      - name: check zenpyre.text_splitters
        run: |
          python -c "from zenpyre import text_splitters"
          python -c "from zenpyre.text_splitters import factory"

      - name: check zenpyre.utils
        run: |
          python -c "from zenpyre import utils"
          python -c "from zenpyre.utils import config"
          python -c "from zenpyre.utils import dataclass"
          python -c "from zenpyre.utils import fallback"
          python -c "from zenpyre.utils import imports"
          python -c "from zenpyre.utils import rich"

      - name: check zenpyre.vectorstores
        run: |
          python -c "from zenpyre import vectorstores"
          python -c "from zenpyre.vectorstores import factory"
